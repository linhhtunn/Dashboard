global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "health-realtime-evaluation"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "host.docker.internal:9108"
          - "localhost:9108"

  - job_name: "rabbitmq"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "host.docker.internal:15692"

  - job_name: "node-exporter"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "host.docker.internal:9100"

  - job_name: "cadvisor"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "host.docker.internal:8080"
